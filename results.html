<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results | QuizMaster AI</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="stylesheet" href="src/styles/dashboard.css">
    <link rel="stylesheet" href="src/styles/results.css">
</head>

<body class="dashboard-page">
    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="brand">🎓 QuizMaster AI</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <span class="icon">📊</span> Dashboard
            </a>
            <a href="create.html" class="nav-item">
                <span class="icon">✨</span> Create Quiz
            </a>
            <a href="my-quizzes.html" class="nav-item">
                <span class="icon">🕒</span> Recent Quizzes
            </a>
            <a href="settings.html" class="nav-item">
                <span class="icon">⚙️</span> Settings
            </a>
        </nav>
    </aside>

    <main class="dashboard-main">
        <div class="results-container">
            <div class="celebration-header">
                <div class="confetti-effect">🎉</div>
                <h1 id="result-message">Analyzing Results...</h1>
                <p>You've completed the assessment. Here's how you performed.</p>
            </div>

            <div class="score-hero glass">
                <div class="score-circle">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="circle" id="score-ring" stroke-dasharray="0, 100"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <text x="18" y="20.35" class="percentage" id="score-text">0%</text>
                    </svg>
                </div>
                <div class="score-stats">
                    <div class="res-stat">
                        <span class="label">Correct</span>
                        <span class="val green" id="res-correct">0</span>
                    </div>
                    <div class="res-stat">
                        <span class="label">Incorrect</span>
                        <span class="val red" id="res-incorrect">0</span>
                    </div>
                    <div class="res-stat">
                        <span class="label">Time Taken</span>
                        <span class="val blue" id="res-time">0:00</span>
                    </div>
                </div>
            </div>

            <div class="action-footer">
                <button class="btn btn-primary" onclick="window.location.href='dashboard.html'">Return to
                    Dashboard</button>
                <button class="btn btn-outline" id="btn-review">Review Detailed Answers</button>
            </div>

            <div class="review-section hidden" id="review-section" style="margin-top: 3rem; text-align: left;">
                <h2 style="margin-bottom: 2rem; font-family: 'Outfit';">Question Review</h2>
                <div id="review-list" style="display: flex; flex-direction: column; gap: 1.5rem;">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="/src/results.ts"></script>
</body>

</html>

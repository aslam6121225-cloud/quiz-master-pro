<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Account | QuizMaster AI</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="stylesheet" href="src/styles/auth.css">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="brand">🎓 QuizMaster AI</a>
                <h1>Create your account</h1>
                <p>Join thousands of educators transforming their teaching.</p>
            </div>

            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <p class="form-hint">At least 8 characters</p>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="btn-submit">
                    <span class="btn-text">Create Account</span>
                    <div class="loader hidden"></div>
                </button>

                <div class="error-msg hidden" id="error-box"></div>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="/src/auth/register.ts"></script>
</body>

</html>

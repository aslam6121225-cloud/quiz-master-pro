<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Feature Test Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 40px;
            background: #f8f9fa;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #1e40af;
            margin-bottom: 32px;
        }

        h2 {
            color: #334155;
            margin: 32px 0 16px;
            font-size: 20px;
        }

        .test-section {
            background: #f1f5f9;
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .test-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .status {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .status.pass {
            background: #10b981;
            color: white;
        }

        .status.fail {
            background: #ef4444;
            color: white;
        }

        .status.pending {
            background: #94a3b8;
            color: white;
        }

        button {
            background: #1e40af;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-right: 12px;
            margin-bottom: 12px;
        }

        button:hover {
            background: #1e3a8a;
        }

        button.secondary {
            background: #64748b;
        }

        button.secondary:hover {
            background: #475569;
        }

        #output {
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 24px;
        }

        .success {
            color: #10b981;
        }

        .error {
            color: #ef4444;
        }

        .info {
            color: #3b82f6;
        }
    </style>
  <script type="module" crossorigin src="/assets/test-gf6XW2e5.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/storageService-BhlXHyt_.js">
</head>

<body>
    <div class="container">
        <h1>🔍 Quizy Platform - Feature Test Dashboard</h1>

        <div class="test-section">
            <h2>Quick Tests</h2>
            <button onclick="testAuth()">Test Authentication</button>
            <button onclick="testStorage()">Test IndexedDB</button>
            <button onclick="testDOM()">Test DOM Elements</button>
            <button onclick="testNavigation()">Test Navigation</button>
            <button onclick="runAllTests()" class="secondary">Run All Tests</button>
        </div>

        <div class="test-section">
            <h2>Feature Tests</h2>
            <button onclick="testDashboard()">Dashboard Features</button>
            <button onclick="testQuizGeneration()">Quiz Generation</button>
            <button onclick="testQuizTaking()">Quiz Taking</button>
            <button onclick="testDataExport()">Data Export</button>
        </div>

        <div class="test-section">
            <h2>Navigation Tests</h2>
            <button onclick="window.location.href='login.html'">→ Login</button>
            <button onclick="window.location.href='dashboard.html'">→ Dashboard</button>
            <button onclick="window.location.href='create.html'">→ Upload</button>
            <button onclick="window.location.href='my-quizzes.html'">→ My Quizzes</button>
        </div>

        <div id="output"></div>
    </div>

</body>

</html>

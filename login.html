<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Access | Quizy</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="stylesheet" href="src/styles/auth.css">
</head>

<body>
    <div class="auth-wrapper">
        <!-- LEFT SIDE: CONTEXT -->
        <aside class="auth-aside">
            <div class="quote-card">
                <p>"Mastering complex domains requires a structured methodology of retrieval and repetition."</p>
                <span>Diagnostic Integrity Framework v4.0</span>
            </div>
        </aside>

        <!-- RIGHT SIDE: INTERACTION -->
        <main class="auth-main">
            <div class="auth-card">
                <header style="margin-bottom: 40px; text-align: center;">
                    <h1 class="serif" style="font-size: 28px; color: var(--navy-deep);">Login to Quizy</h1>
                    <p class="text-muted" style="font-size: 14px;">Access your personal learning workspace</p>
                </header>

                <nav class="auth-tabs">
                    <div class="auth-tab active" data-tab="email">Email Login</div>
                    <div class="auth-tab" data-tab="face">Face Login</div>
                    <div class="auth-tab" data-tab="register">Register</div>
                </nav>

                <!-- TAB: EMAIL LOGIN -->
                <div id="tab-email" class="auth-content">
                    <form class="auth-form" id="form-login">
                        <div class="form-group">
                            <label for="login-email">Email Address</label>
                            <div class="input-container">
                                <span class="icon">📧</span>
                                <input type="email" id="login-email" placeholder="doctor.chen@hospital.org" required
                                    autocomplete="email">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <div class="input-container">
                                <span class="icon">🔒</span>
                                <input type="password" id="login-password" placeholder="••••••••" required
                                    autocomplete="current-password">
                                <span class="toggle-password" id="toggle-pw">👁️</span>
                            </div>
                        </div>
                        <div class="form-options">
                            <label><input type="checkbox" checked> Remember Device</label>
                            <a href="#" class="form-link">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary"
                            style="width: 100%; justify-content: center; height: 48px;" id="btn-login-submit">
                            Sign In to Protocol
                        </button>
                    </form>
                </div>

                <!-- TAB: FACE LOGIN -->
                <div id="tab-face" class="auth-content hidden">
                    <div class="form-group" id="face-email-group" style="margin-bottom: 20px;">
                        <label for="face-email">Verify Registered Email</label>
                        <div class="input-container">
                            <span class="icon">📧</span>
                            <input type="email" id="face-email" placeholder="Enter your registered email" required>
                        </div>
                    </div>
                    <div class="face-container hidden" id="face-capture-zone">
                        <video id="face-video" class="face-video" autoplay playsinline muted></video>
                        <canvas id="face-overlay" class="face-overlay"></canvas>
                    </div>
                    <div class="face-status" id="face-status">Please verify your email to begin biometric scan.</div>
                    <button class="btn btn-primary" id="btn-face-start"
                        style="width: 100%; justify-content: center; height: 48px;">
                        Verify & Scan Face
                    </button>
                    <button class="btn btn-secondary hidden" id="btn-face-reset"
                        style="width: 100%; justify-content: center; height: 48px; margin-top: 12px; border: 1px solid var(--navy-deep); background: transparent; color: var(--navy-deep);">
                        Try Different Email
                    </button>
                </div>

                <!-- TAB: REGISTER -->
                <div id="tab-register" class="auth-content hidden">
                    <form class="auth-form" id="form-register">
                        <div class="form-group">
                            <label for="reg-name">Full Institutional Name</label>
                            <div class="input-container">
                                <span class="icon">👤</span>
                                <input type="text" id="reg-name" placeholder="Dr. Jane Smith" required
                                    autocomplete="name">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="reg-email">Professional Email</label>
                            <div class="input-container">
                                <span class="icon">📧</span>
                                <input type="email" id="reg-email" placeholder="jane.smith@institution.edu" required
                                    autocomplete="email">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="reg-password">Security Phrase</label>
                            <div class="input-container">
                                <span class="icon">🔒</span>
                                <input type="password" id="reg-password" placeholder="••••••••" required
                                    autocomplete="new-password">
                            </div>
                        </div>
                        <div class="form-options">
                            <label style="font-size: 12px;"><input type="checkbox" required> I agree to the Research
                                Participation Terms</label>
                        </div>
                        <button type="submit" class="btn btn-primary"
                            style="width: 100%; justify-content: center; height: 48px;" id="btn-register-submit">
                            Establish Account
                        </button>
                    </form>
                </div>

                <div id="auth-error" class="hidden"
                    style="margin-top: 24px; color: var(--red-error); font-size: 13px; text-align: center; font-weight: 500;">
                </div>
            </div>
        </main>
    </div>

    <!-- SCRIPTS -->
    <script type="module" src="/src/auth/auth.ts"></script>
    <script type="module" src="/src/auth/face-login.ts"></script>
</body>

</html>

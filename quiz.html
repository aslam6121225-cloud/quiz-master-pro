<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institutional Assessment | QuizMaster Pro</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="stylesheet" href="src/styles/quiz.css">
</head>

<body>
    <div class="quiz-wrapper">
        <div class="quiz-container">
            <!-- HEADER -->
            <nav class="quiz-nav">
                <a href="dashboard.html" class="nav-brand" style="font-weight: 700;">🎓 QuizMaster Pro</a>
                <div class="quiz-timer" id="timer">15:00</div>
                <div style="font-size: 13px; font-weight: 600;">PROFESSIONAL_MODE</div>
            </nav>

            <div class="progress-track">
                <div class="progress-indicator" id="progress-bar" style="width: 0%;"></div>
            </div>

            <!-- QUESTIONS -->
            <main id="quiz-main" style="margin-top: 20px;">
                <div class="quiz-card" id="question-card"
                    style="max-width: 800px; margin: 0 auto; padding: 0; overflow: hidden;">

                    <!-- CONCEPT VISUAL (Premium Feature) -->
                    <div id="concept-visual" class="concept-visual"
                        style="height: 240px; background: #e2e8f0; display: none; align-items: center; justify-content: center; overflow: hidden;">
                        <img id="concept-img" src="" alt="Concept Visualization"
                            style="width: 100%; height: 100%; object-fit: cover;">
                    </div>

                    <div style="padding: 32px 40px;">
                        <!-- Question Pill -->
                        <span class="question-pill">QUESTION <span id="q-current">1</span></span>

                        <h2 class="question-text" id="q-text"
                            style="font-size: 20px; line-height: 1.5; margin-top: 16px; margin-bottom: 32px; color: var(--navy-deep);">
                            Loading institutional material...</h2>

                        <div class="options-grid" id="options-container"
                            style="display: flex; flex-direction: column; gap: 16px;">
                            <!-- Options injected here -->
                        </div>
                    </div>


                    <div
                        style="margin-top: 48px; border-top: 1px solid var(--slate-border); padding-top: 32px; display: flex; justify-content: flex-end;">
                        <button class="btn btn-primary" id="btn-next" disabled>Next Sequence →</button>
                    </div>
                </div>
            </main>

            <!-- RESULTS (Hidden) -->
            <main id="result-view" class="hidden">
                <div class="quiz-card" style="text-align: center;">
                    <header class="result-header">
                        <h1 class="serif" style="font-size: 36px; margin-bottom: 8px;">Quizy Assessment Complete
                        </h1>
                        <p class="text-muted" id="motive-slogan">Summary of conceptual performance vectors</p>
                    </header>

                    <div class="score-circle">
                        <span style="font-size: 13px; font-weight: 700; color: var(--slate-text);">FINAL SCORE</span>
                        <span class="score-value" id="final-score">87%</span>
                    </div>

                    <div
                        style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 48px; text-align: left;">
                        <div style="background: var(--paper); padding: 20px; border-radius: 8px;">
                            <p style="font-size: 11px; font-weight: 700; color: var(--slate-text);">ACCURACY</p>
                            <p style="font-size: 20px; font-weight: 700;" id="res-accuracy">18/20</p>
                        </div>
                        <div style="background: var(--paper); padding: 20px; border-radius: 8px;">
                            <p style="font-size: 11px; font-weight: 700; color: var(--slate-text);">TIME REMAINING</p>
                            <p style="font-size: 20px; font-weight: 700;" id="res-time">02:45</p>
                        </div>
                    </div>

                    <div style="border-top: 1px solid var(--slate-border); padding-top: 48px; text-align: left;">
                        <h3 class="serif" style="margin-bottom: 32px; font-size: 24px;">Post-Quizy Review</h3>
                        <div id="review-list">
                            <!-- Injected by quiz.ts -->
                        </div>
                    </div>

                    <div style="display: flex; gap: 16px; justify-content: center;">
                        <a href="dashboard.html" class="btn btn-primary" style="padding: 16px 48px;">Return to
                            Workspace</a>
                        <button class="btn btn-outline" onclick="location.reload()" style="padding: 16px 48px;">Retake
                            Quizy</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script type="module" src="/src/quiz.ts"></script>
</body>

</html>

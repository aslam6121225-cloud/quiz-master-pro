<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Login | QuizMaster AI</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="stylesheet" href="src/styles/face-auth.css">
</head>

<body class="face-auth-page">
    <div class="header-minimal">
        <div class="container">
            <span class="brand">🎓 QuizMaster AI</span>
        </div>
    </div>

    <main class="face-auth-main">
        <div class="auth-card-large glass">
            <div class="auth-header">
                <h1>Face Verification</h1>
                <p id="status-text">Position your face in the frame to log in.</p>
            </div>

            <div class="camera-wrapper">
                <video id="video" autoplay muted playsinline></video>
                <div class="face-guide">
                    <div class="guide-circle"></div>
                </div>
                <div class="status-badge" id="camera-status">Initializing...</div>
            </div>

            <div class="actions">
                <button id="btn-login" class="btn btn-primary btn-lg" disabled>Verify Face</button>
            </div>

            <div class="auth-footer" style="margin-top: 2rem;">
                <p><a href="login.html">Use password instead</a></p>
            </div>
        </div>
    </main>

    <script type="module" src="/src/auth/face-login.ts"></script>
</body>

</html>

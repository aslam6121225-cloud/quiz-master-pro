<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizy - Feature Test Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 40px;
            background: #f8f9fa;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #1e40af;
            margin-bottom: 32px;
        }

        h2 {
            color: #334155;
            margin: 32px 0 16px;
            font-size: 20px;
        }

        .test-section {
            background: #f1f5f9;
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .test-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .status {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .status.pass {
            background: #10b981;
            color: white;
        }

        .status.fail {
            background: #ef4444;
            color: white;
        }

        .status.pending {
            background: #94a3b8;
            color: white;
        }

        button {
            background: #1e40af;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-right: 12px;
            margin-bottom: 12px;
        }

        button:hover {
            background: #1e3a8a;
        }

        button.secondary {
            background: #64748b;
        }

        button.secondary:hover {
            background: #475569;
        }

        #output {
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 24px;
        }

        .success {
            color: #10b981;
        }

        .error {
            color: #ef4444;
        }

        .info {
            color: #3b82f6;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔍 Quizy Platform - Feature Test Dashboard</h1>

        <div class="test-section">
            <h2>Quick Tests</h2>
            <button onclick="testAuth()">Test Authentication</button>
            <button onclick="testStorage()">Test IndexedDB</button>
            <button onclick="testDOM()">Test DOM Elements</button>
            <button onclick="testNavigation()">Test Navigation</button>
            <button onclick="runAllTests()" class="secondary">Run All Tests</button>
        </div>

        <div class="test-section">
            <h2>Feature Tests</h2>
            <button onclick="testDashboard()">Dashboard Features</button>
            <button onclick="testQuizGeneration()">Quiz Generation</button>
            <button onclick="testQuizTaking()">Quiz Taking</button>
            <button onclick="testDataExport()">Data Export</button>
        </div>

        <div class="test-section">
            <h2>Navigation Tests</h2>
            <button onclick="window.location.href='login.html'">→ Login</button>
            <button onclick="window.location.href='dashboard.html'">→ Dashboard</button>
            <button onclick="window.location.href='create.html'">→ Upload</button>
            <button onclick="window.location.href='my-quizzes.html'">→ My Quizzes</button>
        </div>

        <div id="output"></div>
    </div>

    <script type="module">
        import { auth } from './src/firebase';
        import { onAuthStateChanged } from 'firebase/auth';
        import { storage } from './src/services/storageService';

        const output = document.getElementById('output');

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            output.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            output.scrollTop = output.scrollHeight;
        }

        window.testAuth = function () {
            log('Testing Authentication...', 'info');
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    log(`✅ User authenticated: ${user.email}`, 'success');
                    log(`   Display Name: ${user.displayName || 'Not set'}`, 'info');
                } else {
                    const sessionEmail = sessionStorage.getItem('sovereign_session_email');
                    if (sessionEmail) {
                        log(`✅ Session found: ${sessionEmail}`, 'success');
                    } else {
                        log('❌ No authentication found', 'error');
                        log('   Please login first', 'info');
                    }
                }
            });
        };

        window.testStorage = async function () {
            log('Testing IndexedDB...', 'info');
            try {
                const pdfs = await storage.getAll('pdfs');
                const quizzes = await storage.getAll('quizzes');
                const results = await storage.getAll('results');

                log(`✅ IndexedDB accessible`, 'success');
                log(`   PDFs: ${pdfs.length}`, 'info');
                log(`   Quizzes: ${quizzes.length}`, 'info');
                log(`   Results: ${results.length}`, 'info');

                if (quizzes.length > 0) {
                    log(`   Sample: ${quizzes[0].title}`, 'info');
                    log(`   Sequences: ${quizzes[0].sequences?.length || 0}`, 'info');
                }
            } catch (err) {
                log(`❌ IndexedDB error: ${err.message}`, 'error');
            }
        };

        window.testDOM = function () {
            log('Testing DOM Elements...', 'info');
            const page = window.location.pathname.split('/').pop();
            log(`Current page: ${page}`, 'info');

            const elements = [
                'btn-logout', 'btn-random-challenge', 'btn-export-data',
                'drop-zone', 'btn-generate', 'quiz-main'
            ];

            let found = 0;
            elements.forEach(id => {
                if (document.getElementById(id)) {
                    found++;
                    log(`✅ Found: ${id}`, 'success');
                }
            });

            log(`Found ${found} elements on this page`, 'info');
        };

        window.testNavigation = function () {
            log('Testing Navigation...', 'info');
            const links = document.querySelectorAll('a[href]');
            log(`Found ${links.length} links`, 'info');

            const buttons = document.querySelectorAll('button');
            log(`Found ${buttons.length} buttons`, 'info');
        };

        window.testDashboard = async function () {
            log('Testing Dashboard Features...', 'info');

            // Test Random Challenge
            const randomBtn = document.getElementById('btn-random-challenge');
            if (randomBtn) {
                log('✅ Random Challenge button found', 'success');
            } else {
                log('❌ Random Challenge button missing', 'error');
            }

            // Test Export Data
            const exportBtn = document.getElementById('btn-export-data');
            if (exportBtn) {
                log('✅ Export Data button found', 'success');
            } else {
                log('❌ Export Data button missing', 'error');
            }
        };

        window.testQuizGeneration = function () {
            log('Testing Quiz Generation...', 'info');
            const dropZone = document.getElementById('drop-zone');
            const generateBtn = document.getElementById('btn-generate');

            if (dropZone) log('✅ Drop zone found', 'success');
            else log('❌ Drop zone missing', 'error');

            if (generateBtn) log('✅ Generate button found', 'success');
            else log('❌ Generate button missing', 'error');
        };

        window.testQuizTaking = function () {
            log('Testing Quiz Taking...', 'info');
            const quizMain = document.getElementById('quiz-main');
            const nextBtn = document.getElementById('btn-next');

            if (quizMain) log('✅ Quiz container found', 'success');
            else log('❌ Quiz container missing', 'error');

            if (nextBtn) log('✅ Next button found', 'success');
            else log('❌ Next button missing', 'error');
        };

        window.testDataExport = async function () {
            log('Testing Data Export...', 'info');
            try {
                const results = await storage.getAll('results');
                if (results.length > 0) {
                    log(`✅ Found ${results.length} results to export`, 'success');
                    const csv = "Date,Topic,Score\n" + results.map(r =>
                        `${new Date(r.timestamp).toLocaleDateString()},${r.topic},${r.score}`
                    ).join("\n");
                    log('✅ CSV generation successful', 'success');
                } else {
                    log('⚠️ No results to export', 'info');
                }
            } catch (err) {
                log(`❌ Export error: ${err.message}`, 'error');
            }
        };

        window.runAllTests = async function () {
            output.innerHTML = '';
            log('🚀 Running all tests...', 'info');
            log('', 'info');

            await testAuth();
            log('', 'info');

            await testStorage();
            log('', 'info');

            testDOM();
            log('', 'info');

            testNavigation();
            log('', 'info');

            log('✅ All tests complete!', 'success');
        };

        // Auto-run basic tests on load
        setTimeout(() => {
            log('Welcome to Quizy Test Dashboard', 'info');
            log('Click buttons above to test features', 'info');
            log('', 'info');
        }, 100);
    </script>
</body>

</html>
